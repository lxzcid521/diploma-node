<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Переказ за реквізитами</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="top-bar">
  <button class="back-btn" onclick="goBack()">←</button>
  <div class="top-title">Переказ за реквізитами</div>
</div>


<div class="page">
  <div class="container transfer-box">

    <h3>Реквізити отримувача</h3>

    <input type="text" id="iban" placeholder="IBAN отримувача">
    <input type="text" id="receiverName" placeholder="Імʼя отримувача">
    <input type="number" id="amount" placeholder="Сума (₴)">
    <input type="text" id="purpose" placeholder="Призначення платежу">

    <button class="btn" onclick="openConfirm()">Переказати</button>

    <p id="statusMsg"></p>

  </div>
</div>

<div class="modal" id="confirmModal">
  <div class="modal-content">
    <h3>Підтвердити платіж</h3>
    <p id="confirmText"></p>
    <button class="btn" onclick="confirmTransfer()">Підтвердити</button>
    <button class="btn cancel" onclick="closeModal()">Скасувати</button>
    <button class="btn" onclick="saveTemplate()">Зберегти як шаблон</button>
  </div>
</div>


<script src="script/auth.js"></script>
<script src="script/iban-transfer.js"></script>
</body>
</html>
