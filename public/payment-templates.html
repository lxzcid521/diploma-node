<!DOCTYPE html>
<html lang="uk">
<head>

  <title>Payment Templates</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  </div>

<div class="page">
  <div class="container">
    <h2>💾 Мої шаблони платежів</h2>
